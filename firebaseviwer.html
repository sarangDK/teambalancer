<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저장된 플레이어 보기</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(145deg, #0a0a0a, #111);
      color: #f0f0f0;
      padding: 20px;
      margin: 0;
    }
    h1 {
      text-align: center;
      color: #c89b3c;
      text-shadow: 0 0 10px rgba(200, 155, 60, 0.6);
      animation: glowPulse 1.5s ease-in-out infinite alternate;
    }
    .center {
      text-align: center;
      margin-bottom: 20px;
    }
    a {
      color: #0ff;
      text-decoration: none;
      font-weight: bold;
    }
    a:hover {
      color: #fff;
      text-shadow: 0 0 5px #0ff;
    }
    input, select {
      padding: 10px;
      margin: 5px auto;
      display: block;
      width: 300px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      background: #222;
      color: #fff;
      box-shadow: 0 0 10px rgba(0,255,255,0.2);
      transition: all 0.3s ease;
    }
    input:focus, select:focus {
      outline: none;
      box-shadow: 0 0 15px rgba(0,255,255,0.5);
    }
    #sortSelect {
      width: 320px;
    }
    ul {
      list-style: none;
      padding: 0;
      max-width: 800px;
      margin: 0 auto;
    }
    li {
      background: #1a1a1a;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,255,255,0.15);
      transition: all 0.3s ease;
      animation: fadeInUp 0.5s ease both;
    }
    li:hover {
      box-shadow: 0 0 15px rgba(0,191,255,0.4);
      transform: translateY(-3px);
    }
    .stat {
      font-size: 14px;
      color: #ccc;
      margin-top: 5px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glowPulse {
      from { text-shadow: 0 0 10px #c89b3c; }
      to { text-shadow: 0 0 20px #f7cc5c; }
    }
  </style>
</head>
<body>
  <h1>🔥 저장된 플레이어 목록</h1>
  <p class="center"><a href="index.html">← 메인으로 돌아가기</a>
    <button id="clearPlayersBtn" style="margin-left:16px; padding:6px 10px; border-radius:6px; background:#ff4444; color:#fff; border:none;">플레이어 초기화</button>
  </p>

  <input type="text" id="searchInput" placeholder="🔍 이름으로 검색..." />
  <select id="sortSelect">
    <option value="name">🔤 이름순</option>
    <option value="score">📊 점수순</option>
    <option value="winrate">🏆 승률순</option>
  </select>

  <ul id="playerData"></ul>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDp3Vr0l_WbvENgSuPAiN_zfzDTwYzYFzU",
      authDomain: "teambalancer-7720c.firebaseapp.com",
      projectId: "teambalancer-7720c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const playerList = document.getElementById("playerData");
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");
    const clearBtn = document.getElementById("clearPlayersBtn");

    let allPlayers = [];

    db.collection("players").get().then(snapshot => {
      snapshot.forEach(doc => {
        // 문서 id를 보관해야 개별 조작 가능
        allPlayers.push({ id: doc.id, ...doc.data() });
      });
      renderPlayers(allPlayers);
    });

    // 플레이어 컬렉션 전체 삭제 (간단 배치 삭제, 문서 수가 많은 경우 반복 처리 필요)
    async function deleteAllPlayers() {
      if (!confirm("정말로 Firebase에 저장된 모든 플레이어를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.")) return;
      try {
        // 한 번에 가져와서 batch로 삭제
        const snapshot = await db.collection("players").get();
        if (snapshot.empty) {
          alert("삭제할 플레이어가 없습니다.");
          return;
        }
        // Firestore 배치(최대 500문서). 많은 문서가 있으면 반복 처리 필요.
        const batch = db.batch();
        snapshot.forEach(doc => batch.delete(doc.ref));
        await batch.commit();

        // 로컬 상태 갱신 및 UI 리렌더
        allPlayers = [];
        renderPlayers(allPlayers);
        alert("플레이어 초기화 완료");
      } catch (err) {
        console.error(err);
        alert("초기화 중 오류가 발생했습니다: " + err.message);
      }
    }

    clearBtn.addEventListener("click", deleteAllPlayers);

    // 개별 승/패 카운트 업데이트 (트랜잭션 사용)
    async function updateCounts(playerId, addWin = 0, addLose = 0) {
      const ref = db.collection("players").doc(playerId);
      try {
        await db.runTransaction(async (tx) => {
          const doc = await tx.get(ref);
          if (!doc.exists) throw new Error("플레이어 문서를 찾을 수 없습니다.");
          const data = doc.data();
          const newWin = (data.win || 0) + addWin;
          const newLose = (data.lose || 0) + addLose;
          tx.update(ref, { win: newWin, lose: newLose });
        });
        // 로컬 복사에도 반영
        const idx = allPlayers.findIndex(p => p.id === playerId);
        if (idx !== -1) {
          allPlayers[idx].win = (allPlayers[idx].win || 0) + addWin;
          allPlayers[idx].lose = (allPlayers[idx].lose || 0) + addLose;
          renderPlayers(allPlayers);
        }
      } catch (err) {
        console.error(err);
        alert("승/패 업데이트 실패: " + err.message);
      }
    }

    // 개별 플레이어 삭제
    async function deletePlayer(playerId) {
      if (!confirm("정말로 이 플레이어를 삭제하시겠습니까?")) return;
      try {
        await db.collection("players").doc(playerId).delete();
        allPlayers = allPlayers.filter(p => p.id !== playerId);
        renderPlayers(allPlayers);
        alert("삭제 완료");
      } catch (err) {
        console.error(err);
        alert("삭제 중 오류: " + err.message);
      }
    }

    function renderPlayers(players) {
      const keyword = searchInput.value.trim().toLowerCase();
      const filtered = players.filter(p => p.name && p.name.toLowerCase().includes(keyword));

      const sorted = [...filtered].sort((a, b) => {
        const sortBy = sortSelect.value;
        if (sortBy === "name") return a.name.localeCompare(b.name);
        if (sortBy === "score") return b.score - a.score;
        if (sortBy === "winrate") {
          const aRate = a.win + a.lose > 0 ? a.win / (a.win + a.lose) : 0;
          const bRate = b.win + b.lose > 0 ? b.win / (b.win + b.lose) : 0;
          return bRate - aRate;
        }
      });

      playerList.innerHTML = '';
      sorted.forEach(p => {
        const li = document.createElement("li");
        const winRate = (p.win + p.lose > 0) ? `승률: ${Math.round((p.win / (p.win + p.lose)) * 100)}%` : '승률 정보 없음';
        li.innerHTML = `
          <strong style="color:#0ff;">${p.name}</strong> <span style="color:#ccc;">(${p.tier || ''})</span> - <span style="color:#ffd700;">${p.score || 0}점</span><br/>
          <span class="stat">${p.role || ''}${p.sub ? ' / ' + p.sub : ''} | <span style="color:#00bfff">승: ${p.win || 0}</span> <span style="color:#ff6666">패: ${p.lose || 0}</span> | <span style="color:#00ff99">${winRate}</span></span>
        `;

        // 컨트롤 버튼 추가
        const ctrl = document.createElement('div');
        ctrl.style.marginTop = '8px';
        const winBtn = document.createElement('button');
        winBtn.textContent = '+승';
        winBtn.style.marginRight = '6px';
        winBtn.style.padding = '6px';
        winBtn.style.borderRadius = '6px';
        winBtn.style.background = '#00bfff';
        winBtn.style.color = '#000';
        winBtn.style.border = 'none';
        winBtn.addEventListener('click', () => updateCounts(p.id, 1, 0));

        const loseBtn = document.createElement('button');
        loseBtn.textContent = '+패';
        loseBtn.style.marginRight = '6px';
        loseBtn.style.padding = '6px';
        loseBtn.style.borderRadius = '6px';
        loseBtn.style.background = '#ff6666';
        loseBtn.style.color = '#000';
        loseBtn.style.border = 'none';
        loseBtn.addEventListener('click', () => updateCounts(p.id, 0, 1));

        const delBtn = document.createElement('button');
        delBtn.textContent = '삭제';
        delBtn.style.padding = '6px';
        delBtn.style.borderRadius = '6px';
        delBtn.style.background = '#ff4444';
        delBtn.style.color = '#fff';
        delBtn.style.border = 'none';
        delBtn.addEventListener('click', () => deletePlayer(p.id));

        ctrl.appendChild(winBtn);
        ctrl.appendChild(loseBtn);
        ctrl.appendChild(delBtn);
        li.appendChild(ctrl);
        playerList.appendChild(li);
      });
    }

    searchInput.addEventListener("input", () => renderPlayers(allPlayers));
    sortSelect.addEventListener("change", () => renderPlayers(allPlayers));
  </script>
</body>
</html>
